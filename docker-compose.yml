services:
  postgres:
    image: postgres:16
    container_name: battlecrm-postgres
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_DATABASE}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER} -d ${DB_DATABASE}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  migrate:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: battlecrm-migrate
    restart: no
    env_file: .env
    environment:
      DB_HOST: postgres
      NODE_ENV: production
    command: node bin/console.js migration:run --force
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: battlecrm-backend
    restart: unless-stopped
    env_file: .env
    environment:
      DB_HOST: postgres
      NODE_ENV: production
    depends_on:
      migrate:
        condition: service_completed_successfully
    networks:
      - internal

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      args:
        VITE_API_URL: /api
    container_name: battlecrm-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.battlecrm.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.battlecrm.entrypoints=websecure"
      - "traefik.http.routers.battlecrm.tls=true"
      - "traefik.http.routers.battlecrm.tls.certresolver=letsencrypt"
      - "traefik.http.services.battlecrm.loadbalancer.server.port=80"
      - "traefik.docker.network=traefik"
    networks:
      - internal
      - traefik

volumes:
  pgdata:

networks:
  internal:
    driver: bridge
  traefik:
    external: true
